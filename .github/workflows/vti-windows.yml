name: VTI Windows build

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and publish
        run: |
          dotnet restore VTI.Windows/src/VTI.sln
          dotnet publish VTI.Windows/src/VTI.App/VTI.App.csproj -c Release -r win-x64 --self-contained true -o publish/out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VTI-windows-win-x64
          path: publish/out/
